name: COPE
options:
  bundleIdPrefix: com.cope
  deploymentTarget:
    iOS: "18.0"
configs:
  Debug: debug
  Staging: release
  Release: release
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: TKXPY255A2
packages:
  COPEOpenAPI:
    path: ../../packages/mobile-contracts/generated/ios
  DesignSystem:
    path: Packages/DesignSystem
  FeatureToday:
    path: Packages/FeatureToday
targets:
  COPE:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: COPE/Sources
      - path: COPE/Resources/Assets.xcassets
    dependencies:
      - package: COPEOpenAPI
      - package: DesignSystem
      - package: FeatureToday
    settings:
      base:
        INFOPLIST_FILE: COPE/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: COPE/Resources/COPE.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: TKXPY255A2
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.cope.app.dev
          COPE_API_BASE_URL: http://localhost:3000
          APS_ENVIRONMENT: development
        Staging:
          PRODUCT_BUNDLE_IDENTIFIER: com.cope.app.staging
          COPE_API_BASE_URL: https://staging.cope.health
          APS_ENVIRONMENT: development
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.acumenus-cope.app
          COPE_API_BASE_URL: https://cope.acumenus.net
          APS_ENVIRONMENT: production
    scheme:
      testTargets:
        - COPETests
  COPETests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: COPE/Tests
    dependencies:
      - target: COPE
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.cope.app.tests
  COPEUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: COPE/UITests
    dependencies:
      - target: COPE
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.cope.app.uitests
schemes:
  COPE Development:
    build:
      targets:
        COPE: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - COPETests
        - COPEUITests
    profile:
      config: Debug
    analyze:
      config: Debug
    archive:
      config: Debug
  COPE Staging:
    build:
      targets:
        COPE: all
    run:
      config: Staging
    test:
      config: Staging
    profile:
      config: Staging
    analyze:
      config: Staging
    archive:
      config: Staging
  COPE Production:
    build:
      targets:
        COPE: all
    run:
      config: Release
    test:
      config: Release
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release
